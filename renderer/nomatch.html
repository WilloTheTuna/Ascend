<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>No Match Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent !important;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease 0.15s, visibility 0s 0.30s;
      will-change: opacity;
      pointer-events: none;
    }
    #root.visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.12s ease;
    }
    #no-match-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      text-align: center;
    }
    #no-match-msg .nm-text {
      font-family: 'Rajdhani', 'Exo 2', 'Barlow Condensed', 'Segoe UI', Arial, sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 1);
      text-shadow:
        0 0 30px rgba(255, 255, 255, 0.3),
        0 2px 8px rgba(0, 0, 0, 0.8);
      white-space: nowrap;
    }
    #no-match-msg .nm-sub {
      font-family: 'Rajdhani', 'Exo 2', 'Barlow Condensed', 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 6px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@700;800&display=swap">
</head>
<body>
<div id="root">
  <div id="no-match-msg">
    <div class="nm-text">NO MATCH DETECTED</div>
    <div class="nm-sub">In attesa di una partita...</div>
  </div>
</div>
<script>
  let isVisible = false;
  let inMatch = false;

  function showOverlay() {
    // Only show if NOT in a match
    if (inMatch) return;
    const el = document.getElementById('root');
    if (!isVisible && el) {
      isVisible = true;
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
    }
  }

  function hideOverlay() {
    const el = document.getElementById('root');
    if (isVisible && el) {
      isVisible = false;
      el.classList.remove('visible');
    }
  }

  if (window.rc && window.rc.on) {
    window.rc.on('overlay-show', showOverlay);
    window.rc.on('overlay-hide', hideOverlay);
    window.rc.on('roster-update', (data) => {
      inMatch = !!(data && data.inMatch);
      if (inMatch) hideOverlay();
    });
    window.rc.on('roster-clear', () => {
      inMatch = false;
      hideOverlay();
    });
  }
</script>
</body>
</html>
